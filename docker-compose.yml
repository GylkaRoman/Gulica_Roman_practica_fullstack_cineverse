
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cineverse_app
    working_dir: /var/www/laravel
    volumes:
      - ./:/var/www:delegated
      - storage_data:/var/www/laravel/storage
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: cineverse_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:delegated
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: cineverse_db
    restart: always
    environment:
      MYSQL_DATABASE: cineverse
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cineverse_pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
